<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日日小記錄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">日日小記錄</div>
    <div class="login-sub">DAILY JOURNAL</div>
    <p class="login-desc">登入後資料會同步到雲端</p>
    <button class="btn-google-login" id="btnGoogleLogin">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      用 Google 帳號登入
    </button>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-card">
    <div class="modal-header">
      <span>設定</span>
      <button class="modal-close" id="btnCloseSettings">✕</button>
    </div>
    <div class="modal-body">
      <div class="settings-section">
        <label class="settings-label">顯示名稱</label>
        <input class="settings-input" id="inputDisplayName" type="text" placeholder="你希望被稱為什麼？">
      </div>
      <div class="settings-section">
        <button class="btn-save-settings" id="btnSaveSettings">儲存</button>
      </div>
      <div class="settings-divider"></div>
      <div class="settings-section">
        <button class="btn-logout-full" id="btnClearFirestore">清除雲端資料</button>
      </div>
      <div class="settings-section">
        <button class="btn-logout-full" id="btnLogoutFull">登出帳號</button>
      </div>
    </div>
  </div>
</div>

<!-- APP CONTENT -->
<div class="app-content" id="appContent">

<div class="header">
  <div class="logo">日日小記錄<span>DAILY JOURNAL</span></div>
  <div class="header-right">
    <div class="date-nav">
      <button class="date-nav-btn" id="datePrev">◀</button>
      <input type="date" id="datePicker" class="date-picker">
      <span class="date-display" id="dateDisplay"></span>
      <button class="date-nav-btn" id="dateNext">▶</button>
      <button class="date-nav-btn today-btn hidden" id="dateToday" style="font-size:10px;">今天</button>
    </div>
    <button class="mobile-tab-btn" id="mobileTabBtn">計劃表 ▾</button>
    <div class="mobile-tab-dropdown" id="mobileTabDropdown">
      <div class="mobile-tab-dropdown-inner">
        <div class="mobile-tab-option active" data-tab="plan">計劃表</div>
        <div class="mobile-tab-option" data-tab="charts">圖表</div>
        <div class="mobile-tab-option" data-tab="review">檢討簿</div>
      </div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="plan">計劃表</button>
      <button class="nav-tab" data-tab="charts">圖表</button>
      <button class="nav-tab" data-tab="review">檢討簿</button>
    </div>
    <div class="user-menu" id="userMenu">
      <img class="user-avatar" id="userAvatar" src="" alt="">
      <span class="user-name" id="userName"></span>
    </div>
  </div>
</div>

<div class="goals-bar">
  <div class="goal-item">
    <span class="goal-label">年目標</span>
    <input class="goal-input" id="goalYear" type="text" placeholder="今年想達成什麼？">
  </div>
  <div class="goal-separator"></div>
  <div class="goal-item">
    <span class="goal-label">月目標</span>
    <input class="goal-input" id="goalMonth" type="text" placeholder="這個月的焦點">
  </div>
  <div class="goal-separator"></div>
  <div class="goal-item">
    <span class="goal-label">今日目標</span>
    <input class="goal-input" id="goalDay" type="text" placeholder="今天最重要的一件事" style="min-width: 160px;">
  </div>
</div>

<div class="main">
  <div class="page active" id="page-plan">
    <div class="table-container">
      <table id="mainTable">
        <thead>
          <tr>
            <th style="width:60px">時間</th>
            <th style="width:180px">待辦事項</th>
            <th style="width:200px">實際執行</th>
            <th style="width:120px">類別</th>
            <th style="width:180px">投入度（每格10分鐘）</th>
            <th>回饋</th>
            <th style="width:30px"></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="legend" style="margin-top: 12px;">
      <span><span class="legend-dot legend-green"></span>高投入</span>
      <span><span class="legend-dot legend-yellow"></span>中等</span>
      <span><span class="legend-dot legend-red"></span>低投入</span>
      <span style="margin-left: 4px; font-size: 10px;">點擊方格切換，空格 = 未填</span>
    </div>

    <div class="diary-section">
      <div class="section-title">一日記錄</div>
      <textarea class="diary-input" id="diaryInput" placeholder="今天怎麼樣？有什麼想記下來的……"></textarea>
    </div>
  </div>

  <div class="page" id="page-charts">
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">每日類別時間分布</div>
        <canvas id="categoryPie" height="220"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">投入度雷達（24小時）</div>
        <canvas id="engagementRadar" height="220"></canvas>
      </div>
      <div class="chart-card full">
        <div class="chart-title">大任務完成表</div>
        <div style="overflow-x: auto;">
          <table class="tasks-table" id="tasksTable">
            <thead>
              <tr>
                <th style="width: 160px">主題</th>
                <th>目標</th>
                <th style="width: 100px">進度</th>
              <th style="width: 200px">已完成事項</th>
            </tr>
          </thead>
          <tbody id="tasksBody"></tbody>
        </table>
        </div>
        <button class="btn-add" id="btnAddTask">＋ 新增大任務</button>
      </div>
    </div>
  </div>

  <div class="page" id="page-review">
    <div class="review-tabs">
      <button class="review-tab active" data-period="week">週檢討</button>
      <button class="review-tab" data-period="month">月檢討</button>
      <button class="review-tab" data-period="year">年檢討</button>
    </div>
    <div class="review-content" id="reviewContent">
      <div class="review-empty">目前沒有檢討紀錄</div>
    </div>
  </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="firebase-auth.js"></script>
<script src="firebase-db.js"></script>
<script src="script.js"></script>
</body>
</html>
